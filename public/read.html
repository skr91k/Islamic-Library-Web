<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ الكتب - Islamic Books Reader</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="قارئ الكتب الإسلامية - اقرأ الكتب الإسلامية مع ترجمة آلية. Islamic book reader with AI translation support.">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="قارئ كتب إسلامية, Islamic book reader, Arabic book reader, قراءة كتب, ترجمة كتب إسلامية, Islamic books translation">

    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="قارئ الكتب - Islamic Books Reader">
    <meta property="og:description" content="قارئ الكتب الإسلامية مع ترجمة آلية">
    <meta property="og:locale" content="ar_SA">

    <!-- Theme -->
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="read_styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
    <div class="container">
        <!-- Loading Screen -->
        <div id="loading" class="loading">
            <div class="spinner">
                <span class="progress-text" id="progress-text"></span>
            </div>
            <p>جاري تحميل الكتاب...</p>
        </div>

        <!-- Book Info - Now just title display -->
        <div id="book-info" class="book-info hidden"></div>

        <!-- Page Controls -->
        <div id="page-controls" class="page-controls hidden" style="display: none !important;">
            <div class="goto-page">
                <span>انتقال إلى الصفحة:</span>
                <input type="number" id="goto-input" class="goto-input" min="1" placeholder="رقم">
                <button class="goto-btn" onclick="goToPage()">انتقال</button>
            </div>
        </div>

        <!-- Book Reader -->
        <div id="book-reader" class="hidden">
            <div class="reader-container">
                <div class="reader-header">
                    <div class="header-title-section">
                        <div class="reader-title" id="book-title-header"></div>
                        <div class="reader-author clickable" id="book-author-header" onclick="filterByAuthor()"></div>
                    </div>
                    <div class="header-seekbar-section">
                        <div class="progress-container">
                            <div class="progress-bar" id="progress-bar">
                                <div class="progress-fill" id="progress-fill">
                                    <div class="progress-thumb" id="progress-thumb"></div>
                                </div>
                            </div>
                            <div class="progress-tooltip" id="progress-tooltip">الصفحة 1</div>
                        </div>
                        <div class="page-info-text">
                            <span id="current-page-info">1</span> / <span id="total-pages-info">1</span>
                        </div>
                    </div>
                    <div class="header-controls">
                        <button class="ai-translate-btn" onclick="toggleAiTranslate()" id="ai-translate-btn"
                            title="AI Translation">
                            🤖
                        </button>
                        <button class="theme-toggle2" onclick="toggleTheme()" id="theme-toggle">
                            🌙
                        </button>
                        <button class="back-btn" onclick="goBack()">⬅️</button>
                    </div>
                </div>

                <!-- Top Navigation -->
                <div class="navigation navigation-top">
                    <button class="nav-btn" id="prev-btn-top" onclick="previousPage(false)">الصفحة السابقة</button>
                    <div class="page-info">
                        <span id="current-page-top">1</span> / <span id="total-pages-top">1</span>
                    </div>
                    <button class="nav-btn" id="next-btn-top" onclick="nextPage(false)">الصفحة التالية</button>
                </div>

                <div class="page-content" id="page-content"></div>

                <!-- Bottom Navigation -->
                <div class="navigation navigation-bottom">
                    <button class="nav-btn" id="prev-btn" onclick="previousPage()">الصفحة السابقة</button>
                    <div class="page-info">
                        <span id="current-page">1</span> / <span id="total-pages">1</span>
                    </div>
                    <button class="nav-btn" id="next-btn" onclick="nextPage()">الصفحة التالية</button>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error-message" class="error hidden"></div>

        <!-- Translation Settings Modal -->
        <div id="translation-settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ Translation Settings | إعدادات الترجمة</h3>
                    <button class="modal-close" onclick="closeTranslationSettings()">✕</button>
                </div>
                <div class="modal-body">
                    <!-- Language Selection -->
                    <div class="setting-group">
                        <label class="setting-label">🌍 Target Language | اللغة المستهدفة</label>
                        <select id="translation-language" class="setting-select" onchange="saveTranslationSettings()">
                            <optgroup label="── Popular ──">
                                <option value="en">English</option>
                                <option value="ur">اردو (Urdu)</option>
                                <option value="tr">Türkçe (Turkish)</option>
                            </optgroup>
                            <optgroup label="── Indian Languages ──">
                                <option value="ml">മലയാളം (Malayalam)</option>
                                <option value="hi">हिन्दी (Hindi)</option>
                                <option value="bn">বাংলা (Bengali)</option>
                                <option value="ta">தமிழ் (Tamil)</option>
                                <option value="te">తెలుగు (Telugu)</option>
                                <option value="kn">ಕನ್ನಡ (Kannada)</option>
                                <option value="gu">ગુજરાતી (Gujarati)</option>
                                <option value="mr">मराठी (Marathi)</option>
                                <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
                            </optgroup>
                            <optgroup label="── Southeast Asian ──">
                                <option value="id">Bahasa Indonesia</option>
                                <option value="ms">Bahasa Melayu</option>
                            </optgroup>
                            <optgroup label="── East Asian ──">
                                <option value="zh-CN">中文简体 (Chinese Simplified)</option>
                                <option value="zh-TW">中文繁體 (Chinese Traditional)</option>
                                <option value="ja">日本語 (Japanese)</option>
                                <option value="ko">한국어 (Korean)</option>
                            </optgroup>
                            <optgroup label="── Central Asian ──">
                                <option value="uz">Oʻzbek (Uzbek)</option>
                                <option value="kk">Қазақ (Kazakh)</option>
                                <option value="tg">Тоҷикӣ (Tajik)</option>
                                <option value="ky">Кыргызча (Kyrgyz)</option>
                                <option value="tk">Türkmen (Turkmen)</option>
                            </optgroup>
                            <optgroup label="── European ──">
                                <option value="ru">Русский (Russian)</option>
                                <option value="fr">Français (French)</option>
                                <option value="de">Deutsch (German)</option>
                                <option value="es">Español (Spanish)</option>
                                <option value="it">Italiano (Italian)</option>
                                <option value="pt">Português (Portuguese)</option>
                                <option value="nl">Nederlands (Dutch)</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- Translation Style -->
                    <div class="setting-group">
                        <label class="setting-label">📝 Translation Style | نمط الترجمة</label>
                        <select id="translation-style" class="setting-select" onchange="saveTranslationSettings()">
                            <option value="readable">Easy to Read | سهلة القراءة</option>
                            <option value="literal">Literal/Word-by-Word | حرفية</option>
                            <option value="scholarly">Scholarly/Academic | أكاديمية</option>
                            <option value="simple">Simple/Basic | مبسطة</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">🤖 AI Model | نموذج الذكاء الاصطناعي</label>
                        <select id="translation-model" class="setting-select" onchange="saveTranslationSettings()">


                            <optgroup label="Latest Generation (Gemini 3.1  or 3.1+)">
                                <option value="gemini-flash-lite-latest">Gemini Latest Flash Lite (Fastest & Cheapest)
                                </option>
                                <option value="gemini-flash-latest" selected>Gemini Latest Flash (Fast & Balanced)
                                </option>
                                <option value="gemini-pro-latest">Gemini Latest Pro (Highest Quality & Nuance)</option>
                            </optgroup>



                            <optgroup label="Latest Generation (Gemini 3.1)">
                                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (Fastest & Cheapest)
                                </option>
                                <option value="gemini-3.1-flash" selected>Gemini 3.1 Flash (Fast & Balanced)</option>
                                <option value="gemini-3.1-pro">Gemini 3.1 Pro (Highest Quality & Nuance)</option>
                            </optgroup>

                            <optgroup label="Previous Stable (Gemini 2.5)">
                                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                            </optgroup>

                        </select>
                    </div>

                    <!-- API Key -->
                    <div class="setting-group">
                        <label class="setting-label">🔑 Your API Key (Optional) | مفتاح API الخاص بك</label>
                        <input type="password" id="user-api-key" class="setting-input"
                            placeholder="Enter your Gemini API key..." onchange="saveTranslationSettings()">
                        <div class="setting-hint">
                            <strong>How to get an API key:</strong><br>
                            1. Go to <a href="https://aistudio.google.com/apikey"
                                target="_blank">aistudio.google.com/apikey</a><br>
                            2. Sign in with Google account<br>
                            3. Click "Create API Key"<br>
                            4. Copy and paste the key here
                        </div>
                    </div>

                    <!-- Cache Management -->
                    <div class="setting-group">
                        <label class="setting-label">💾 Translation Cache | ذاكرة التخزين المؤقت</label>
                        <div class="cache-info">
                            <span id="cache-count">0</span> translations saved
                        </div>
                        <button class="setting-btn danger" onclick="clearTranslationCache()">
                            🗑️ Clear All Cached Translations
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="read_script.js"></script>

    <!-- Firebase SDK -->
    <script src="firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAnalytics, logEvent } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js';

        // Initialize Firebase
        if (typeof FIREBASE_CONFIG !== 'undefined') {
            const app = initializeApp(FIREBASE_CONFIG);
            const analytics = getAnalytics(app);

            // Get book info from localStorage
            const bookInfo = JSON.parse(localStorage.getItem('currentBook') || '{}');

            // Log page view with book details
            logEvent(analytics, 'page_view', {
                page_title: 'Islamic Books Reader',
                page_location: window.location.href,
                book_name: bookInfo.book_name || 'Unknown',
                book_id: bookInfo.book_id || 'Unknown'
            });

            // Log book read event
            if (bookInfo.book_id) {
                logEvent(analytics, 'book_read', {
                    book_id: bookInfo.book_id,
                    book_name: bookInfo.book_name,
                    author_name: bookInfo.author_name
                });
            }

            // Make analytics available globally
            window.firebaseAnalytics = analytics;
            window.logAnalyticsEvent = (eventName, params) => {
                logEvent(analytics, eventName, params);
            };

            console.log('Firebase Analytics initialized');
        }
    </script>
</body>

</html>
